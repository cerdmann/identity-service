$kind: http-example
request:
  url: "{{baseUrl}}/users/:id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    id: <string>
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "user": {
          "id": "<string>",
          "name": "<string>",
          "email": "<email>"
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "user": {
            "type": "object",
            "properties": {
              "id": {
                "type": "string",
                "example": "u1"
              },
              "name": {
                "type": "string",
                "example": "Jane Doe"
              },
              "email": {
                "type": "string",
                "example": "jane.doe@example.com",
                "format": "email"
              }
            }
          }
        }
      }
order: 1000
