openapi: 3.0.0
info:
  title: Identity API
  version: 1.0.0
  description: >-
    The Identity API manages users and identity lookups. It is deployed into a
    shared Kubernetes cluster orchestrated by the accounts-api repository.
servers:
  - url: '{{baseUrl}}'
    description: Identity API Server
paths:
  /users:
    post:
      summary: Create a user
      description: >-
        Creates a new user with the provided name and email. If a user with the
        same email already exists, returns the existing user with an `existing`
        flag set to true.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              name: Jane Doe
              email: jane@example.com
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
              example:
                user:
                  id: u1
                  name: Jane Doe
                  email: jane@example.com
        '200':
          description: User already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  existing:
                    type: boolean
                    example: true
              example:
                user:
                  id: u1
                  name: Jane Doe
                  email: jane@example.com
                existing: true
        '400':
          description: Validation error — name and email are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'name and email are required'
    get:
      summary: List all users
      description: Returns a list of all users currently stored in the system.
      operationId: listUsers
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
              example:
                users:
                  - id: u1
                    name: Jane Doe
                    email: jane@example.com
                  - id: u2
                    name: John Smith
                    email: john@example.com
  /users/{id}:
    get:
      summary: Get user by ID
      description: Retrieves a single user by their unique identifier.
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the user (e.g. u1, u2)
          schema:
            type: string
          example: u1
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
              example:
                user:
                  id: u1
                  name: Jane Doe
                  email: jane@example.com
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'user not found'
  /health:
    get:
      summary: Health check
      description: Returns the health status of the Identity API service.
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
              example:
                status: ok
                service: identity-api
components:
  schemas:
    User:
      type: object
      description: Represents a user in the identity system.
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          description: Unique identifier for the user
          example: u1
        name:
          type: string
          description: Full name of the user
          example: Jane Doe
        email:
          type: string
          description: Email address of the user
          example: jane@example.com
    UserList:
      type: object
      description: A list of users.
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
    Error:
      type: object
      description: Standard error response.
      required:
        - error
      properties:
        error:
          type: string
          description: A human-readable error message
          example: 'an error occurred'
    HealthCheck:
      type: object
      description: Health check response indicating service status.
      required:
        - status
        - service
      properties:
        status:
          type: string
          description: Health status of the service
          example: ok
        service:
          type: string
          description: Name of the service
          example: identity-api
    CreateUserRequest:
      type: object
      description: Request body for creating a new user.
      required:
        - name
        - email
      properties:
        name:
          type: string
          description: Full name of the user
          example: Jane Doe
        email:
          type: string
          description: Email address of the user
          example: jane@example.com
