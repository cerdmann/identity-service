$kind: http-request
name: Get User by ID
method: GET
url: "{{baseUrl}}/users/:userId"
pathVariables:
  userId: "10098765"
examples: .resources/Get User by ID.resources/examples
order: 3000
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200 or 404", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });

      pm.test("If 200, response has user with id, name, and email; if 404, error is user not found", function () {
          const jsonData = pm.response.json();
          if (pm.response.code === 200) {
              pm.expect(jsonData).to.have.property("id");
              pm.expect(jsonData).to.have.property("name");
              pm.expect(jsonData).to.have.property("email");
          } else if (pm.response.code === 404) {
              pm.expect(jsonData).to.have.property("error", "user not found");
          }
      });
    language: text/javascript
