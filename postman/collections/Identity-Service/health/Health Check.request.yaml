$kind: http-request
description: Returns the health status of the service.
url: "{{baseUrl}}/health"
method: GET
headers:
  Accept: application/json
body:
  type: text
  content: ""
examples: ./.resources/Health Check.resources/examples
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // --- Producer Contract Tests: GET /health ---

      pm.test("[Contract] Status is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("[Contract] Content-Type is application/json", function () {
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("[Contract] Response body matches schema", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an("object");
        pm.expect(json).to.have.property("status");
        pm.expect(json).to.have.property("service");
      });

      pm.test("[Contract] status field is a string", function () {
        const json = pm.response.json();
        pm.expect(json.status).to.be.a("string");
      });

      pm.test("[Contract] service field is a string", function () {
        const json = pm.response.json();
        pm.expect(json.service).to.be.a("string");
      });

      pm.test("[Contract] status value is 'ok'", function () {
        const json = pm.response.json();
        pm.expect(json.status).to.eql("ok");
      });

      pm.test("[Contract] service value is 'identity-api'", function () {
        const json = pm.response.json();
        pm.expect(json.service).to.eql("identity-api");
      });

      pm.test("[Contract] No extra unexpected top-level fields", function () {
        const json = pm.response.json();
        const allowed = ["status", "service"];
        Object.keys(json).forEach(function (key) {
          pm.expect(allowed).to.include(key);
        });
      });

      pm.test("[Contract] Response time is under 500ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(500);
      });