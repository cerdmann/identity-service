$kind: http-example
request:
  url: "{{baseUrl}}/users"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "Priya Kapoor",
        "email": "priya.kapoor@stellarworks.io"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "user": {
          "id": "u7",
          "name": "Priya Kapoor",
          "email": "priya.kapoor@stellarworks.io"
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "user": {
            "type": "object",
            "properties": {
              "id": {
                "type": "string",
                "example": "u7"
              },
              "name": {
                "type": "string",
                "example": "Priya Kapoor"
              },
              "email": {
                "type": "string",
                "example": "priya.kapoor@stellarworks.io",
                "format": "email"
              }
            }
          }
        }
      }
order: 2000
