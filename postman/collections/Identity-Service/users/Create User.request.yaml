$kind: http-request
description: Creates a new user. Returns 201 with the created user on success, 200 with existing:true if email already exists, or 400 if fields are missing.
url: "{{baseUrl}}/users"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "<string>",
      "email": "<email>"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string",
          "example": "Jane Doe"
        },
        "email": {
          "type": "string",
          "example": "jane.doe@example.com",
          "format": "email"
        }
      },
      "required": [
        "name",
        "email"
      ]
    }
examples: ./.resources/Create User.resources/examples
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // --- Producer Contract Tests: POST /users ---

      pm.test("[Contract] Status is 201 (new user) or 200 (existing email) or 400 (bad request)", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201, 400]);
      });

      pm.test("[Contract] Content-Type is application/json", function () {
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      if (pm.response.code === 201) {
        pm.test("[Contract] 201 - Response has user object", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("user");
        });

        pm.test("[Contract] 201 - user.id is a string", function () {
          const json = pm.response.json();
          pm.expect(json.user.id).to.be.a("string");
        });

        pm.test("[Contract] 201 - user.name is a string", function () {
          const json = pm.response.json();
          pm.expect(json.user.name).to.be.a("string");
        });

        pm.test("[Contract] 201 - user.email is a string", function () {
          const json = pm.response.json();
          pm.expect(json.user.email).to.be.a("string");
        });

        pm.test("[Contract] 201 - user object has no extra fields", function () {
          const json = pm.response.json();
          const allowed = ["id", "name", "email"];
          Object.keys(json.user).forEach(function (key) {
            pm.expect(allowed).to.include(key);
          });
        });

        pm.test("[Contract] 201 - Response does NOT include 'existing' flag", function () {
          const json = pm.response.json();
          pm.expect(json).to.not.have.property("existing");
        });

        pm.test("[Contract] 201 - Save userId to collection variable", function () {
          const json = pm.response.json();
          pm.collectionVariables.set("userId", json.user.id);
        });
      }

      if (pm.response.code === 200) {
        pm.test("[Contract] 200 - Response has user object", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("user");
        });

        pm.test("[Contract] 200 - existing flag is true", function () {
          const json = pm.response.json();
          pm.expect(json.existing).to.eql(true);
        });

        pm.test("[Contract] 200 - user.id is a string", function () {
          const json = pm.response.json();
          pm.expect(json.user.id).to.be.a("string");
        });

        pm.test("[Contract] 200 - user.name is a string", function () {
          const json = pm.response.json();
          pm.expect(json.user.name).to.be.a("string");
        });

        pm.test("[Contract] 200 - user.email is a string", function () {
          const json = pm.response.json();
          pm.expect(json.user.email).to.be.a("string");
        });
      }

      if (pm.response.code === 400) {
        pm.test("[Contract] 400 - Response has error field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("error");
        });

        pm.test("[Contract] 400 - error is a string", function () {
          const json = pm.response.json();
          pm.expect(json.error).to.be.a("string");
        });

        pm.test("[Contract] 400 - error message is 'name and email are required'", function () {
          const json = pm.response.json();
          pm.expect(json.error).to.eql("name and email are required");
        });
      }