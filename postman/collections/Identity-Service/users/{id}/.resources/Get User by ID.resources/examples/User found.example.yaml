$kind: http-example
request:
  url: "{{baseUrl}}/users/:id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    id: u2
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "user": {
          "id": "u2",
          "name": "Saoirse Flanagan",
          "email": "saoirse.flanagan@driftlabs.co"
        }
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "user": {
            "type": "object",
            "properties": {
              "id": {
                "type": "string",
                "example": "u2"
              },
              "name": {
                "type": "string",
                "example": "Saoirse Flanagan"
              },
              "email": {
                "type": "string",
                "example": "saoirse.flanagan@driftlabs.co",
                "format": "email"
              }
            }
          }
        }
      }
order: 1000
