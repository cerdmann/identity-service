$kind: http-request
description: Returns all users.
url: "{{baseUrl}}/users"
method: GET
headers:
  Accept: application/json
body:
  type: text
  content: ""
examples: ./.resources/List Users.resources/examples
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // --- Producer Contract Tests: GET /users ---

      pm.test("[Contract] Status is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("[Contract] Content-Type is application/json", function () {
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("[Contract] Response body has 'users' array", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property("users");
        pm.expect(json.users).to.be.an("array");
      });

      pm.test("[Contract] No extra top-level fields", function () {
        const json = pm.response.json();
        const allowed = ["users"];
        Object.keys(json).forEach(function (key) {
          pm.expect(allowed).to.include(key);
        });
      });

      pm.test("[Contract] Each user has id (string)", function () {
        const json = pm.response.json();
        json.users.forEach(function (user) {
          pm.expect(user.id).to.be.a("string");
        });
      });

      pm.test("[Contract] Each user has name (string)", function () {
        const json = pm.response.json();
        json.users.forEach(function (user) {
          pm.expect(user.name).to.be.a("string");
        });
      });

      pm.test("[Contract] Each user has email (string)", function () {
        const json = pm.response.json();
        json.users.forEach(function (user) {
          pm.expect(user.email).to.be.a("string");
        });
      });

      pm.test("[Contract] Each user has no extra fields", function () {
        const json = pm.response.json();
        const allowed = ["id", "name", "email"];
        json.users.forEach(function (user) {
          Object.keys(user).forEach(function (key) {
            pm.expect(allowed).to.include(key);
          });
        });
      });