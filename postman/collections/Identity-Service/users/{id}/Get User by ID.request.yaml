$kind: http-request
name: Get User by ID
description: Returns a user by their ID, or 404 if not found.
url: "{{baseUrl}}/users/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: u1
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "default": "<string>"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
examples: ./.resources/Get User by ID.resources/examples
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // --- Producer Contract Tests: GET /users/:id ---

      pm.test("[Contract] Status is 200 or 404", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });

      pm.test("[Contract] Content-Type is application/json", function () {
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      if (pm.response.code === 200) {
        pm.test("[Contract] 200 - Response has user object", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("user");
        });

        pm.test("[Contract] 200 - user.id is a string", function () {
          const json = pm.response.json();
          pm.expect(json.user.id).to.be.a("string");
        });

        pm.test("[Contract] 200 - user.name is a string", function () {
          const json = pm.response.json();
          pm.expect(json.user.name).to.be.a("string");
        });

        pm.test("[Contract] 200 - user.email is a string", function () {
          const json = pm.response.json();
          pm.expect(json.user.email).to.be.a("string");
        });

        pm.test("[Contract] 200 - user object has no extra fields", function () {
          const json = pm.response.json();
          const allowed = ["id", "name", "email"];
          Object.keys(json.user).forEach(function (key) {
            pm.expect(allowed).to.include(key);
          });
        });

        pm.test("[Contract] 200 - No extra top-level fields", function () {
          const json = pm.response.json();
          const allowed = ["user"];
          Object.keys(json).forEach(function (key) {
            pm.expect(allowed).to.include(key);
          });
        });
      }

      if (pm.response.code === 404) {
        pm.test("[Contract] 404 - Response has error field", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("error");
        });

        pm.test("[Contract] 404 - error is a string", function () {
          const json = pm.response.json();
          pm.expect(json.error).to.be.a("string");
        });

        pm.test("[Contract] 404 - error message is 'user not found'", function () {
          const json = pm.response.json();
          pm.expect(json.error).to.eql("user not found");
        });

        pm.test("[Contract] 404 - No extra top-level fields", function () {
          const json = pm.response.json();
          const allowed = ["error"];
          Object.keys(json).forEach(function (key) {
            pm.expect(allowed).to.include(key);
          });
        });
      }