$kind: http-request
name: Create User
method: POST
url: '{{baseUrl}}/users'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Jane Doe",
      "email": "jane@example.com"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 201 or 200", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });

      pm.test("Response has user object with id, name, and email", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("name");
          pm.expect(jsonData).to.have.property("email");
      });

      pm.test("If 201, user matches request data; if 200, existing is true", function () {
          const jsonData = pm.response.json();
          if (pm.response.code === 201) {
              pm.expect(jsonData.name).to.eql("Jane Doe");
              pm.expect(jsonData.email).to.eql("jane@example.com");
          } else if (pm.response.code === 200) {
              pm.expect(jsonData).to.have.property("existing", true);
          }
      });

      pm.test("Store userId in collection variable", function () {
          const jsonData = pm.response.json();
          if (jsonData.id) {
              pm.collectionVariables.set("userId", jsonData.id);
          }
      });
    language: text/javascript
